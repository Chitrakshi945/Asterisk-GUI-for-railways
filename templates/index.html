<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asterisk GUI for Railways</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
 
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f8f9fa;
      padding-top: 30px;
    }
    .card {
      margin-bottom: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      border: none;
    }
    h1, h2 {
      color: #0d6efd;

      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    .section-title {
      border-bottom: 2px solid #0d6efd;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }
    .form-control, .btn {
      border-radius: 6px;
    }
    pre {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
    }
    .btn i {
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h1>Asterisk GUI - Railway VoIP Control Panel</h1>

<div class="container">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Asterisk GUI</a>
        <div>
           <a href="/hotline" class="btn btn-secondary">Hotline Config</a>
          <a class="btn btn-light" href="/system">Go to System Page →</a>
        </div>
      </div>
    </nav>

    <h1 class="text-center mb-5"><i class="bi bi-telephone-fill text-primary"></i> Asterisk GUI - Railway VoIP Control Panel</h1>

  <!-- Station Management (CRUD) -->
  <div class="card p-4">
      <h2 class="section-title"><i class="bi bi-gear-fill"></i> Manage Stations</h2>
      <form id="stationForm" class="row g-3">
        <div class="col-md-3"><input type="text" class="form-control" placeholder="Telephone No / Username " id="telephone" required></div>
        <div class="col-md-3"><input type="text" class="form-control" placeholder="Office" id="office" required></div>
        <div class="col-md-3"><input type="text" class="form-control" placeholder="Station" id="station" required></div>
        <div class="col-md-3"><input type="text" class="form-control" placeholder="Designation" id="designation" required></div>
        <div class="col-md-3"><input type="text" class="form-control" placeholder="Department" id="department" required></div>
       <!--- <div class="col-md-3"><input type="text" class="form-control" placeholder="STD" id="std" required></div> --->
        <div class="col-md-3"><input type="text" class="form-control" placeholder="Server IP" id="server_ip" required></div>
        <div class="col-md-3"><input type="text" class="form-control" placeholder="SIP Username" id="sip_username" required></div>
        <div class="col-md-3"><input type="password" class="form-control" placeholder="SIP Password" id="sip_password" required></div>
        <div class="col-md-3 d-flex align-items-end">
          <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-circle"></i> Add Station</button>
        </div>
      </form>
      <div class="table-responsive mt-4">
        <table class="table table-bordered table-striped table-hover" id="stationTable">
          <thead class="table-primary">
        <tr>
          <th>Telephone</th>
          <th>Office</th>
          <th>Station</th>
          <th>Designation</th>
          <th>Department</th>

          <th>Server IP</th>
          <th>SIP Username</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- SIP Users View -->
   <div class="card p-4">
      <h2 class="section-title"><i class="bi bi-person-badge-fill"></i> SIP Users (PJSIP)</h2>
      <button class="btn btn-outline-success" onclick="loadPeers()"><i class="bi bi-person-lines-fill"></i> Load SIP Peers</button>
      <pre id="sipOutput" class="mt-3">[Not Loaded]</pre>
    </div>
  </div>

  <!-- Reload Asterisk Config
  <div class="form-section">
    <h2>Reload Asterisk</h2>
    <button onclick="reloadAsterisk()">Reload Now</button>
  </div>  ---->

  <!-- Call Logs (CDR) -->
<!---  <div class="form-section">
    <h2>Call Logs (CDR)</h2>
    <button onclick="loadCDR()">Load Call Logs</button>
    <table id="cdrTable">
      <thead>
        <tr>
          <th>Time</th>
          <th>From</th>
          <th>To</th>
          <th>Duration (s)</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div> --->
  <!-- JavaScript Logic -->
  <script>
    async function fetchStations() {
      try {
        const res = await fetch('/stations');
        if (!res.ok) throw new Error('Failed to fetch stations');

        const stations = await res.json();
        const tbody = document.querySelector('#stationTable tbody');
        tbody.innerHTML = '';
        stations.forEach(st => {
          const row = `<tr>
            <td>${st.telephone_no}</td>
            <td>${st.office}</td>
            <td>${st.station}</td>
            <td>${st.designation}</td>
            <td>${st.department}</td>
          
            <td>${st.server_ip}</td>
            <td>${st.sip_username || '-'}</td>
            <td><button onclick="deleteStation('${st.telephone_no}')">Delete</button></td>
          </tr>`;
          tbody.innerHTML += row;
        });
      } catch (err) {
        alert('Error loading stations: ' + err.message);
      }
    }

    async function deleteStation(telephone) {
      const confirmDelete = confirm(`Are you sure you want to delete station with telephone no: ${telephone}?`);
      if (!confirmDelete) return;

      await fetch(`/delete_station/${telephone}`, {
        method: 'DELETE'
      });

      fetchStations(); // reload table
    }

    document.getElementById('stationForm').addEventListener('submit', async e => {
      e.preventDefault();
      const data = {
        telephone: document.getElementById('telephone').value,
        office: document.getElementById('office').value,
        station: document.getElementById('station').value,
        designation: document.getElementById('designation').value,
        department: document.getElementById('department').value,
        //std: document.getElementById('std').value, 
        server_ip: document.getElementById('server_ip').value,
        sip_username: document.getElementById('sip_username').value,
        sip_password: document.getElementById('sip_password').value
      };

      await fetch('/stations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      // ALSO call add_pjsip_user
      await fetch('/add_pjsip_user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: data.sip_username,
          password: data.sip_password
        })
      });

      alert("✅ Station and SIP user added successfully.");
      fetchStations();
      e.target.reset();
    });

    async function loadPeers() {
      const res = await fetch('/asterisk/peers');
      const text = await res.text();
      document.getElementById('sipOutput').innerText = text;
    }

    window.onload = fetchStations;
  </script>
</body>
</html>
