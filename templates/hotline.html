<!DOCTYPE html>
<html>
<head>
  <title>Hotline Configuration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="p-4">
  <div class="container">
    <h2 class="mb-4">Configure Hotline</h2>

    <!-- Hotline Form -->
    <form id="hotlineForm">
      <div class="mb-3">
        <label for="hotline_extension" class="form-label">Hotline Extension (e.g. 300)</label>
        <input type="text" class="form-control" id="hotline_extension" required>
      </div>

      <div class="mb-3">
        <label for="target_extension" class="form-label">Target Extension (Auto Dial to)</label>
        <input type="text" class="form-control" id="target_extension" required>
      </div>

      <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Hotline</button>
    </form>

    <div class="mt-3" id="responseMessage"></div>
    <a href="/" class="btn btn-secondary mt-4">← Back to Home</a>

    <hr class="my-4">

    <!-- Hotline Table -->
    <h4>Existing Hotlines</h4>
    <table class="table table-bordered table-hover" id="hotlineTable">
      <thead class="table-light">
        <tr>
          <th>Hotline Extension</th>
          <th>Target Extension</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="hotlineTableBody">
        <!-- Hotlines will be loaded here -->
      </tbody>
    </table>
  </div>

  <script>
    // Load Hotlines
    async function loadHotlines() {
      const response = await fetch('/hotlines');
      const data = await response.json();

      const tbody = document.getElementById('hotlineTableBody');
      tbody.innerHTML = '';

      if (Array.isArray(data)) {
        data.forEach(h => {
          const row = `
            <tr>
              <td>${h.hotline_extension}</td>
              <td>${h.target_extension}</td>
              <td>
                <button class="btn btn-sm btn-danger" onclick="deleteHotline(${h.id})">
                  <i class="bi bi-trash"></i> Delete
                </button>
              </td>
            </tr>`;
          tbody.innerHTML += row;
        });
      } else {
        tbody.innerHTML = `<tr><td colspan="3">Error loading hotlines.</td></tr>`;
      }
    }

    // Add Hotline
    document.getElementById('hotlineForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const hotlineExtension = document.getElementById('hotline_extension').value;
      const targetExtension = document.getElementById('target_extension').value;

      const response = await fetch('/hotline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          hotline_extension: hotlineExtension,
          target_extension: targetExtension
        })
      });

      const result = await response.json();
      document.getElementById('responseMessage').innerText = result.message || result.error;
      loadHotlines();  // Refresh table
    });

    // Delete Hotline
    async function deleteHotline(id) {
      const confirmDelete = confirm("Are you sure you want to delete this hotline?");
      if (!confirmDelete) return;

      const response = await fetch(`/delete_hotline/${id}`, {
        method: 'DELETE'
      });

      const result = await response.json();
      alert(result.message || result.error);
      loadHotlines();  // Refresh table
    }

    // Initial load
    window.onload = loadHotlines;
  </script>
</body>
</html>
